# =====================================================================
# NGINX Configuration
# =====================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {

    # -----------------------------------------------------------------
    # MIME
    # -----------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -----------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # -----------------------------------------------------------------
    # Performance
    # -----------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;

    types_hash_max_size 2048;
    server_tokens off;

    # -----------------------------------------------------------------
    # Buffer
    # -----------------------------------------------------------------
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 8 8k;
    proxy_busy_buffers_size 16k;

    # -----------------------------------------------------------------
    # GZIP
    # -----------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;

    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        application/font-woff
        application/font-woff2
        application/vnd.ms-fontobject;

    # -----------------------------------------------------------------
    # Rate Limit
    # -----------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # -----------------------------------------------------------------
    # Upstream
    # -----------------------------------------------------------------
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # =================================================================
    # HTTP
    # =================================================================
    server {
        listen 80;
        server_name bokhar.online www.bokhar.online;

        return 301 https://$host$request_uri;
    }

    # =================================================================
    # HTTPS
    # =================================================================
    server {

        listen 443 ssl;
        http2 on;

        server_name bokhar.online www.bokhar.online;

        # -------------------------------------------------------------
        # SSL
        # -------------------------------------------------------------
        ssl_certificate      /etc/nginx/ssl/bokhar_fullchain.crt;
        ssl_certificate_key  /etc/nginx/ssl/bokhar.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        ssl_ciphers
            ECDHE-ECDSA-AES128-GCM-SHA256:
            ECDHE-RSA-AES128-GCM-SHA256:
            ECDHE-ECDSA-AES256-GCM-SHA384:
            ECDHE-RSA-AES256-GCM-SHA384:
            ECDHE-ECDSA-CHACHA20-POLY1305:
            ECDHE-RSA-CHACHA20-POLY1305;

        ssl_prefer_server_ciphers off;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;

        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # -------------------------------------------------------------
        # Security Headers
        # -------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval';
            style-src 'self' 'unsafe-inline';
            img-src 'self' https: data:;
            font-src 'self' data:;
            connect-src 'self';
            frame-ancestors 'self';
        " always;

        # -------------------------------------------------------------
        # General
        # -------------------------------------------------------------
        client_max_body_size 20M;

        client_body_timeout 30s;
        client_header_timeout 30s;
        send_timeout 30s;

        root /usr/share/nginx/html;
        index index.html;

        # =============================================================
        # Frontend
        # =============================================================
        location / {

            limit_req zone=general burst=50 nodelay;

            try_files $uri $uri/ /index.html;

            add_header Cache-Control "no-cache, must-revalidate";
        }

        # =============================================================
        # API
        # =============================================================
        location ^~ /api/ {

            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;

            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 15s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # =============================================================
        # Admin
        # =============================================================
        location ^~ /admin/ {

            limit_req zone=admin burst=10 nodelay;

            proxy_pass http://backend;

            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 15s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # =============================================================
        # Metrics
        # =============================================================
        location ^~ /metrics/ {

            allow 127.0.0.1;
            deny all;

            proxy_pass http://backend;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =============================================================
        # Static
        # =============================================================
        location /static/ {

            alias /app/staticfiles/;

            expires 365d;

            access_log off;

            add_header Cache-Control "public, immutable";

            add_header Vary "Accept-Encoding";
        }

        # =============================================================
        # Media
        # =============================================================
        location /media/ {

            alias /app/media/;

            expires 30d;

            access_log off;

            add_header Cache-Control "public";

            add_header Vary "Accept-Encoding";
        }

        location ~* ^/media/.*\.(php|py|pl|sh|cgi)$ {
            deny all;
        }

        # =============================================================
        # Block Hidden Files
        # =============================================================
        location ~ /\.(?!well-known).* {
            deny all;
        }

        location ~* \.(git|svn|env|htaccess|htpasswd|DS_Store)$ {
            deny all;
            return 404;
        }

        # =============================================================
        # Health
        # =============================================================
        location = /health {

            access_log off;

            add_header Content-Type text/plain;

            return 200 "OK\n";
        }

    }

}