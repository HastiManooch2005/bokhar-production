services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env.local
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - redis

  celery:
    build:
      context: ./backend
    command: celery -A bokhar worker --loglevel=info
    env_file:
      - .env.local
    volumes:
      - ./backend:/app
    depends_on:
      - redis