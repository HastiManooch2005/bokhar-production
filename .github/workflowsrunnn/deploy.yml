name: Deploy to VPS

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t backend:latest ./backend
          docker build -t frontend:latest ./Bokhar-Frontend

      - name: Save and compress
        run: |
          docker save backend:latest | gzip > backend.tar.gz
          docker save frontend:latest | gzip > frontend.tar.gz

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend.tar.gz,frontend.tar.gz,docker-compose.yml"
          target: "/root/bokhar-production"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/bokhar-production
            docker load < backend.tar.gz
            docker load < frontend.tar.gz
            docker compose down
            docker compose up -d